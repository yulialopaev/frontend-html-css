<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Olympic rings</title>
    <style>
        .rings {
            text-align: center;
            margin-top: 0;
        }

        .row {
            margin-bottom: -475px;
        }

        .ring-symbol {
            font-size: 500px;
            margin: 0 -35px;
        }

        .blue {
            color: #0078c8;
        }

        .black {
            color: #000000;
        }

        .red {
            color: #eb334e;
        }

        .yellow {
            color: #fcb131;
        }

        .green {
            color: #00a651;
        }
    </style>
</head>
<body>
<div class="rings">
    <div class="row">
        <span class="ring-symbol blue">○</span>
        <span class="ring-symbol black">○</span>
        <span class="ring-symbol red">○</span>
    </div>

    <div class="row">
        <span class="ring-symbol yellow">○</span>
        <span class="ring-symbol green">○</span>
    </div>

</div>
</body>
</html>
